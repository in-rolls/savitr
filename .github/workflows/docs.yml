name: docs

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
      # mlx-vlm/mlx are Apple-Silicon-only, so install savitr WITHOUT deps; conf.py mocks the
      # heavy imports so autodoc still resolves the (lazily-imported) modules.
      - run: uv venv
      - run: uv pip install sphinx furo myst-parser sphinx-autodoc-typehints
      - run: uv pip install -e . --no-deps
      - run: .venv/bin/sphinx-build -b html -W --keep-going docs docs/_build/html
      - uses: actions/upload-pages-artifact@v3
        with:
          path: docs/_build/html

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
