name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
      - run: uv venv
      - run: uv pip install ruff mypy
      - run: .venv/bin/ruff check savitr
      - run: .venv/bin/ruff format --check savitr
      - run: .venv/bin/mypy savitr

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v8.3.2
        with:
          python-version: "3.12"
      - run: uv build
